# Exists solely for spike T5 probe (f): measure docker/compose/Postgres startup + test timings on
# the cloud VM. The fixture app does not use a database.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: scratch
    ports:
      # 5433 on purpose: the VM's preinstalled Postgres owns 5432 once probe (f)
      # runs `service postgresql start`.
      - "5433:5432"
