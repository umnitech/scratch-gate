# Advisory review — NOT a required check. Never add `review` to the ruleset.
# Auth: subscription OAuth via `claude setup-token` → repo secret CLAUDE_CODE_OAUTH_TOKEN
# (T4-validated 2026-07-04). Prompt calibrated 2026-07-06: anti-noise rubric (>80% confidence,
# zero-findings-valid), severity honesty (T7's over-graded test-smell), blind dispatch (never
# read the implementer's summary), plus a light Security axis (deep pass = security-review.yml).
name: review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  review:
    name: review (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need base branch for BASE...HEAD diff
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Two-axis review
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          BASE_REF: ${{ github.base_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          claude -p "Review the diff 'git diff origin/${BASE_REF}...HEAD' (three-dot, merge-base) for PR #${PR_NUMBER}.
            Find the originating issue from the branch name / commit messages (gh issue view N --comments). Do NOT read the PR description or the implementer's comments — the diff is the evidence, and a stated rationale never downgrades a finding.
            Report along THREE AXES, separately — never merged, never reranked:
            ## Spec — versus the issue's acceptance criteria: (a) required but missing/partial, (b) present but not asked for (scope creep), (c) implemented but looks wrong. Quote the criterion for each finding.
            ## Standards — code quality: Critical / Important / Minor. Skip anything tooling already enforces. Severity honesty: Critical means provably breaks the spec, a test, or security; a style or test-structure smell is at most Important — when torn between two severities, pick the lower and say why.
            ## Security — one-line flags only (authz, data exposure, injection, secrets); the deep pass runs elsewhere. Usually empty.
            Report a finding only at >80% confidence it is real and worth a human's attention. ZERO findings on any axis is a valid, expected outcome — never invent findings to seem thorough.
            If no issue is found, say so and review Standards + Security only.
            End with one line per axis: finding count + worst finding. Under 500 words total." \
            --allowedTools "Bash(git *),Bash(gh *),Read,Grep,Glob" \
            > review.md
          gh pr comment "$PR_NUMBER" --body-file review.md
