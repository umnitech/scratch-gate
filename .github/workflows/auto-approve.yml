# Auto-approval bot — satisfies the ruleset's required approval count (1) so routine PRs can
# auto-merge on green. It can NEVER satisfy CODEOWNERS: PRs touching protected paths still wait
# for a human owner's review. This file lives in .github/ — itself a protected path — so changing
# it requires a human owner's approval.
name: auto-approve

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  approve:
    name: approve
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr review "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --approve \
            --body "Auto-approval: satisfies the review count for auto-merge. Cannot satisfy CODEOWNERS — protected paths still require a human owner."
