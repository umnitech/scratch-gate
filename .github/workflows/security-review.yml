# Deep security review — ADVISORY, never a required check; never add `security` to the ruleset.
# Fires when the PR touches sensitive paths (tune SENSITIVE_GLOBS per stack at bootstrap) or
# on demand via the `security-review` label. Decision record: docs/decisions.md 2026-07-06 —
# the owner's tap on a sensitive-path PR means "read the security report, acknowledged"; this
# job is what makes that tap informed. The path filter is deliberately BROADER than CODEOWNERS:
# authz bugs live in ordinary route/middleware code (T7 lesson). Findings are written to teach.
# Auth: subscription OAuth via `claude setup-token` → repo secret CLAUDE_CODE_OAUTH_TOKEN
# (pattern T4-validated 2026-07-04).
name: security

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  security:
    name: security (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need base branch for BASE...HEAD diff
      - name: Does this PR need a deep security pass?
        id: gate
        env:
          BASE_REF: ${{ github.base_ref }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        run: |
          # Sensitive-path filter — broader than CODEOWNERS on purpose. Tune per stack.
          SENSITIVE_GLOBS='^(auth|migrations)/|(^|/)(auth|session|token|login|permission|role|middleware)[^/]*\.|(^|/)api/|\.sql$|^\.github/'
          if echo " $LABELS " | grep -q " security-review "; then
            echo "run=true"  >> "$GITHUB_OUTPUT"; echo "why=the security-review label" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "origin/${BASE_REF}...HEAD" | grep -Eiq "$SENSITIVE_GLOBS"; then
            echo "run=true"  >> "$GITHUB_OUTPUT"; echo "why=sensitive paths in the diff" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Claude Code
        if: steps.gate.outputs.run == 'true'
        run: npm install -g @anthropic-ai/claude-code
      - name: Deep security review
        if: steps.gate.outputs.run == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          BASE_REF: ${{ github.base_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TRIGGER_WHY: ${{ steps.gate.outputs.why }}
        run: |
          claude -p "Security review of the diff 'git diff origin/${BASE_REF}...HEAD' (three-dot, merge-base) for PR #${PR_NUMBER}. Read surrounding code wherever the diff alone cannot answer a question.
            Hunt in priority order: (1) authorization — any route, query, or mutation reachable without the right ownership/role check (IDOR, missing owner check, trusting client-supplied ids); (2) authentication and sessions — weakened login, token/cookie handling, unsafe defaults; (3) data exposure — PII in logs, over-broad API responses, sensitive fields serialized out; (4) injection — SQL/command/HTML built from unsanitized input; (5) secrets — credentials in code, config, or test fixtures.
            Report a finding only at >80% confidence it is real. ZERO findings is a valid, expected outcome — write 'No security findings.' and stop; never invent findings to seem thorough.
            For each finding: a severity (Critical = exploitable as merged · Important = a weakness needing intent or luck · Note), then exactly two short parts — 'What could go wrong:' a concrete story in plain language for a non-security reader, and 'The fix:' the smallest change that closes it.
            Do not read the PR description or the implementer's comments — the diff and the code are the evidence.
            This review is advisory: a human merges. Your job is to make their tap informed. Under 600 words." \
            --allowedTools "Bash(git *),Bash(gh *),Read,Grep,Glob" \
            > security-review.md
          { echo "## Security review (advisory — triggered by ${TRIGGER_WHY})"; echo; cat security-review.md; } > comment.md
          gh pr comment "$PR_NUMBER" --body-file comment.md
